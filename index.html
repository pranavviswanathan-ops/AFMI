<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mutual Fund Portfolio Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Mutual Fund Portfolio Tracker</h1>

    <label>Select Fund:</label>
    <select id="fundSelect">
      <option>Loading funds...</option>
    </select>

    <label>Enter Units:</label>
    <input type="number" id="units" placeholder="Enter units">

    <button onclick="calculateValue()">Calculate Value</button>

    <h2 id="result"></h2>
  </div>

  <script src="script.js"></script>
</body>
</html>
